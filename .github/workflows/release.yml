name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: flutter pub get
        run: flutter pub get

      - name: Build release APK
        # Derive build-name / build-number from the git tag (e.g. v1.1.0 ->
        # versionName 1.1.0, versionCode 10100) so the tag is the single source
        # of truth. This avoids shipping an APK whose internal version lags
        # behind the tag when pubspec.yaml isn't bumped.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "Building APK version $VERSION (versionCode $BUILD_NUMBER)"
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="$BUILD_NUMBER"

      - name: Rename APK to include the tag
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             "easy_contact_sync-${GITHUB_REF_NAME}.apk"

      - name: Upload APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: easy_contact_sync-${{ github.ref_name }}.apk
