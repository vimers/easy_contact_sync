<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background. Foreground: blue contact + red/yellow sync arrows. -->

  <!-- Contact head -->
  <circle cx="256" cy="210" r="48" fill="#1A73E8" />

  <!-- Contact body -->
  <path d="M 170 330 Q 170 270 256 270 Q 342 270 342 330 Q 342 360 256 360 Q 170 360 170 330 Z" fill="#1A73E8" />

  <!-- Sync arrow - left (counter-clockwise), red -->
  <path d="M 155 180 A 120 120 0 0 0 155 330"
        stroke="#EA4335" stroke-width="28" fill="none" stroke-linecap="round" />
  <polygon points="135,320 175,320 155,365" fill="#EA4335" />

  <!-- Sync arrow - right (clockwise), yellow -->
  <path d="M 357 330 A 120 120 0 0 0 357 180"
        stroke="#FBBC05" stroke-width="28" fill="none" stroke-linecap="round" />
  <polygon points="337,190 377,190 357,145" fill="#FBBC05" />
</svg>
