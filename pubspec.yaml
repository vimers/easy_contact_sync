name: easy_contact_sync
description: An open-source CardDAV contact sync app for Android and iOS.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP & XML
  http: ^1.2.0
  xml: ^6.5.0

  # Local contacts
  flutter_contacts: ^1.1.7

  # Encrypted storage
  flutter_secure_storage: ^9.2.0

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  # Pin sqlite3 to 2.x: 3.x uses Dart native assets and downloads a prebuilt
  # .so from GitHub release assets, which is unreachable on some networks.
  sqlite3: ^2.0.0
  path: ^1.9.0

  # Background tasks
  workmanager: ^0.8.0

  # Notifications
  flutter_local_notifications: ^17.2.0

  # i18n
  intl: ^0.20.2

  # Routing
  go_router: ^14.2.0
  mobile_scanner: ^7.2.0
  lpinyin: ^2.0.3
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_1024.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_1024.png"
  remove_alpha_ios: true
